<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Milky2018/metis promotional card</title>
  <desc id="desc">Promotional card for MoonBit bindings to METIS, showing graph partitioning with one crossing edge and a concise MoonBit API call.</desc>
  <defs>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef5f8"/>
      <stop offset="0.45" stop-color="#f2f8ee"/>
      <stop offset="1" stop-color="#fff5ec"/>
    </linearGradient>
    <linearGradient id="dark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#152229"/>
      <stop offset="1" stop-color="#233238"/>
    </linearGradient>
    <filter id="card-shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="22" stdDeviation="24" flood-color="#172328" flood-opacity="0.16"/>
    </filter>
    <filter id="node-shadow" x="-30%" y="-30%" width="160%" height="170%">
      <feDropShadow dx="0" dy="10" stdDeviation="9" flood-color="#172328" flood-opacity="0.18"/>
    </filter>
    <style>
      .brand { font: 900 78px Arial, sans-serif; fill: #172328; }
      .subtitle { font: 800 34px Arial, sans-serif; fill: #4e5d62; }
      .eyebrow { font: 900 24px Arial, sans-serif; fill: #ef604b; letter-spacing: 2px; }
      .pill { font: 900 24px Arial, sans-serif; fill: #172328; }
      .node { font: 900 46px Arial, sans-serif; fill: white; text-anchor: middle; dominant-baseline: central; }
      .part { font: 900 28px Arial, sans-serif; }
      .mono { font: 800 26px Menlo, Consolas, monospace; fill: #e4f0ec; }
      .mono-hot { font: 900 26px Menlo, Consolas, monospace; fill: #ffe08a; }
      .caption { font: 900 27px Arial, sans-serif; fill: #ef604b; }
      .small { font: 800 24px Arial, sans-serif; fill: #5f6d71; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#hero)"/>
  <path d="M92 96H1508" stroke="#dce7dd" stroke-width="10" stroke-linecap="round"/>
  <path d="M92 96H1040" stroke="#ef604b" stroke-width="10" stroke-linecap="round"/>

  <text x="96" y="178" class="eyebrow">MOONBIT NATIVE FFI</text>
  <text x="92" y="286" class="brand">Milky2018/metis</text>
  <text x="96" y="344" class="subtitle">MoonBit bindings to METIS</text>

  <g transform="translate(92 404)">
    <rect width="520" height="250" rx="12" fill="url(#dark)" filter="url(#card-shadow)"/>
    <text x="38" y="52" class="mono">let graph =</text>
    <text x="38" y="94" class="mono">  @metis.CsrGraph(...)</text>
    <text x="38" y="136" class="mono">let result =</text>
    <text x="38" y="178" class="mono-hot">  part_graph_kway(graph, 2)</text>
    <text x="38" y="220" class="mono">result.part  // [0,0,0,1,1,1]</text>
  </g>

  <g transform="translate(96 714)">
    <rect width="205" height="58" rx="29" fill="#ffffff" stroke="#d5ddcf" stroke-width="3"/>
    <text x="102" y="38" class="pill" text-anchor="middle">CSR graphs</text>
    <rect x="224" width="210" height="58" rx="29" fill="#ffffff" stroke="#d5ddcf" stroke-width="3"/>
    <text x="329" y="38" class="pill" text-anchor="middle">Mesh APIs</text>
    <rect x="454" width="245" height="58" rx="29" fill="#ffffff" stroke="#d5ddcf" stroke-width="3"/>
    <text x="576" y="38" class="pill" text-anchor="middle">Node ordering</text>
  </g>

  <g transform="translate(780 218) scale(0.84)" filter="url(#card-shadow)">
    <rect width="856" height="578" rx="18" fill="#fffdf7" stroke="#d4dece" stroke-width="3"/>
    <rect x="78" y="102" width="312" height="304" rx="16" fill="#e3f2e9"/>
    <rect x="466" y="102" width="312" height="304" rx="16" fill="#e4effc"/>

    <line x1="202" y1="160" x2="118" y2="292" stroke="#73858a" stroke-width="10" stroke-linecap="round"/>
    <line x1="202" y1="160" x2="306" y2="302" stroke="#73858a" stroke-width="10" stroke-linecap="round"/>
    <line x1="118" y1="292" x2="306" y2="302" stroke="#73858a" stroke-width="10" stroke-linecap="round"/>
    <line x1="548" y1="302" x2="736" y2="292" stroke="#73858a" stroke-width="10" stroke-linecap="round"/>
    <line x1="548" y1="302" x2="652" y2="160" stroke="#73858a" stroke-width="10" stroke-linecap="round"/>
    <line x1="652" y1="160" x2="736" y2="292" stroke="#73858a" stroke-width="10" stroke-linecap="round"/>

    <line x1="306" y1="302" x2="394" y2="302" stroke="#ef604b" stroke-width="15" stroke-linecap="round"/>
    <line x1="430" y1="302" x2="548" y2="302" stroke="#ef604b" stroke-width="15" stroke-linecap="round"/>
    <text x="414" y="302" font-family="Arial, sans-serif" font-size="92" font-weight="900" fill="#ef604b" text-anchor="middle" dominant-baseline="central">/</text>

    <g filter="url(#node-shadow)">
      <circle cx="202" cy="160" r="62" fill="#24955b" stroke="#ffffff" stroke-width="8"/>
      <text x="202" y="160" class="node">0</text>
      <circle cx="118" cy="292" r="62" fill="#24955b" stroke="#ffffff" stroke-width="8"/>
      <text x="118" y="292" class="node">1</text>
      <circle cx="306" cy="302" r="62" fill="#24955b" stroke="#ffffff" stroke-width="8"/>
      <text x="306" y="302" class="node">2</text>
      <circle cx="548" cy="302" r="62" fill="#2878d7" stroke="#ffffff" stroke-width="8"/>
      <text x="548" y="302" class="node">3</text>
      <circle cx="736" cy="292" r="62" fill="#2878d7" stroke="#ffffff" stroke-width="8"/>
      <text x="736" y="292" class="node">4</text>
      <circle cx="652" cy="160" r="62" fill="#2878d7" stroke="#ffffff" stroke-width="8"/>
      <text x="652" y="160" class="node">5</text>
    </g>

    <text x="176" y="466" class="part" fill="#24955b">part 0</text>
    <text x="600" y="466" class="part" fill="#2878d7">part 1</text>
    <text x="258" y="524" class="caption">1 crossing edge</text>
    <text x="524" y="524" class="small">from native METIS</text>
  </g>

  <text x="96" y="838" font-family="Arial, sans-serif" font-size="28" font-weight="850" fill="#172328">Safe MoonBit API. Vendored METIS C engine. Native target.</text>
</svg>

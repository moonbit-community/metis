<svg xmlns="http://www.w3.org/2000/svg" width="920" height="320" viewBox="0 0 920 320" role="img" aria-labelledby="title desc">
  <title id="title">MoonBit METIS bindings graph partitioning overview</title>
  <desc id="desc">An animated diagram showing a CSR graph entering METIS through MoonBit bindings and producing balanced graph partitions.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#334155"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <style>
      .label { font: 600 16px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .small { font: 500 12px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .mono { font: 600 13px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #1e293b; }
      .edge { stroke: #94a3b8; stroke-width: 4; stroke-linecap: round; }
      .node { stroke: #334155; stroke-width: 3; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; rx: 8; filter: url(#shadow); }
      .arrow { stroke: #334155; stroke-width: 3; marker-end: url(#arrow); stroke-linecap: round; }
    </style>
  </defs>

  <rect width="920" height="320" fill="#f8fafc"/>

  <g transform="translate(34 32)">
    <rect class="panel" width="245" height="245" rx="8"/>
    <text class="label" x="20" y="34">Input graph</text>
    <text class="small" x="20" y="56">CSR arrays in MoonBit</text>
    <text class="mono" x="20" y="218">xadj + adjncy</text>

    <line class="edge" x1="74" y1="93" x2="158" y2="93"/>
    <line class="edge" x1="158" y1="93" x2="188" y2="164"/>
    <line class="edge" x1="188" y1="164" x2="103" y2="184"/>
    <line class="edge" x1="103" y1="184" x2="74" y2="93"/>
    <line class="edge" x1="158" y1="93" x2="103" y2="184"/>

    <circle class="node" cx="74" cy="93" r="18" fill="#e2e8f0"/>
    <circle class="node" cx="158" cy="93" r="18" fill="#e2e8f0"/>
    <circle class="node" cx="188" cy="164" r="18" fill="#e2e8f0"/>
    <circle class="node" cx="103" cy="184" r="18" fill="#e2e8f0"/>
    <text class="mono" x="69" y="98">0</text>
    <text class="mono" x="153" y="98">1</text>
    <text class="mono" x="183" y="169">2</text>
    <text class="mono" x="98" y="189">3</text>
  </g>

  <path class="arrow" d="M300 154 C333 154 344 154 374 154"/>

  <g transform="translate(389 86)">
    <rect class="panel" width="150" height="136" rx="8"/>
    <text class="label" x="31" y="38">MoonBit</text>
    <text class="label" x="45" y="63">METIS</text>
    <text class="small" x="25" y="90">safe API + FFI</text>
    <text class="mono" x="18" y="116">part_graph_kway</text>
    <animateTransform attributeName="transform" type="translate" values="389 86;389 80;389 86" dur="2.8s" repeatCount="indefinite"/>
  </g>

  <path class="arrow" d="M558 154 C591 154 602 154 632 154"/>

  <g transform="translate(648 32)">
    <rect class="panel" width="238" height="245" rx="8"/>
    <text class="label" x="20" y="34">Output</text>
    <text class="small" x="20" y="56">balanced partitions + orderings</text>
    <text class="mono" x="20" y="218">part: [0, 0, 1, 1]</text>

    <line class="edge" x1="70" y1="93" x2="154" y2="93"/>
    <line class="edge" x1="154" y1="93" x2="184" y2="164"/>
    <line class="edge" x1="184" y1="164" x2="99" y2="184"/>
    <line class="edge" x1="99" y1="184" x2="70" y2="93"/>
    <line class="edge" x1="154" y1="93" x2="99" y2="184"/>

    <path d="M130 70 C108 105 111 151 132 203" fill="none" stroke="#0f172a" stroke-width="3" stroke-dasharray="8 8" opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.2;0.42;0.86;1" dur="3.4s" repeatCount="indefinite"/>
      <animate attributeName="stroke-dashoffset" values="32;0" dur="1.7s" repeatCount="indefinite"/>
    </path>

    <circle class="node" cx="70" cy="93" r="18" fill="#e2e8f0">
      <animate attributeName="fill" values="#e2e8f0;#e2e8f0;#38bdf8;#38bdf8;#e2e8f0" keyTimes="0;0.18;0.4;0.9;1" dur="3.4s" repeatCount="indefinite"/>
    </circle>
    <circle class="node" cx="154" cy="93" r="18" fill="#e2e8f0">
      <animate attributeName="fill" values="#e2e8f0;#e2e8f0;#38bdf8;#38bdf8;#e2e8f0" keyTimes="0;0.18;0.4;0.9;1" dur="3.4s" repeatCount="indefinite"/>
    </circle>
    <circle class="node" cx="184" cy="164" r="18" fill="#e2e8f0">
      <animate attributeName="fill" values="#e2e8f0;#e2e8f0;#a3e635;#a3e635;#e2e8f0" keyTimes="0;0.18;0.4;0.9;1" dur="3.4s" repeatCount="indefinite"/>
    </circle>
    <circle class="node" cx="99" cy="184" r="18" fill="#e2e8f0">
      <animate attributeName="fill" values="#e2e8f0;#e2e8f0;#a3e635;#a3e635;#e2e8f0" keyTimes="0;0.18;0.4;0.9;1" dur="3.4s" repeatCount="indefinite"/>
    </circle>
    <text class="mono" x="65" y="98">0</text>
    <text class="mono" x="149" y="98">1</text>
    <text class="mono" x="179" y="169">2</text>
    <text class="mono" x="94" y="189">3</text>
  </g>

  <g transform="translate(122 288)">
    <circle cx="0" cy="0" r="6" fill="#38bdf8"/>
    <text class="small" x="14" y="4">partition 0</text>
    <circle cx="115" cy="0" r="6" fill="#a3e635"/>
    <text class="small" x="129" y="4">partition 1</text>
    <line x1="248" y1="0" x2="284" y2="0" stroke="#0f172a" stroke-width="3" stroke-dasharray="8 8"/>
    <text class="small" x="294" y="4">separator / cut</text>
    <text class="small" x="494" y="4">also: mesh conversion, nested dissection, cache-friendly reordering</text>
  </g>
</svg>
